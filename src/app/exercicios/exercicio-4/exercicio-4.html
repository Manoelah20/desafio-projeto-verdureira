<div class="container-app">
    <header>
        <h1>4) STORE com SIGNALS</h1>
        <p>USUÁRIOS</p>
        <div class="search-container">
            <mat-form-field appearance="outline" class="search-field">
                <mat-label>Pesquisar</mat-label>
                <input matInput (input)="onBusca($event)" />
                <mat-icon matPrefix>search</mat-icon>
            </mat-form-field>
        </div>
    </header>

    <div class="users-section">
        <h2 class="section-title">Usuários cadastrados</h2>

        @if (store.loading()) {
        <div class="loading-box">
            <mat-spinner diameter="40"></mat-spinner>
        </div>
        } @else {
        <div class="users-list">
            @for (user of store.usuarios(); track user.id) {
            <div class="user-item">
                <div class="user-info">
                    <span class="user-name">{{ user.nome }}</span>
                    <span class="user-email">{{ user.email }}</span>
                </div>
                <button mat-icon-button class="edit-button" (click)="abrirModalEditar(user)">
                    <mat-icon>edit</mat-icon>
                </button>
            </div>
            } @empty {
            <p class="empty">Nenhum usuário encontrado.</p>
            }
        </div>
        }
    </div>

    <button mat-fab class="fab-add" color="warn" (click)="abrirModalCriar()">
        <mat-icon>add</mat-icon>
    </button>
</div>
